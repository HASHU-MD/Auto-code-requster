<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HASHU-MD | BACKGROUND MONITOR</title>
    <style>
        body { background: #050505; color: #00ff41; font-family: 'Courier New', monospace; padding: 20px; }
        .box { border: 1px solid #00ff41; padding: 20px; background: #0d0d0d; box-shadow: 0 0 15px rgba(0,255,65,0.2); }
        h1 { text-align: center; border-bottom: 2px solid #00ff41; padding-bottom: 10px; }
        #status { color: #fff; font-size: 14px; margin-bottom: 10px; }
        .log-container { background: #000; height: 350px; overflow-y: auto; border: 1px inset #00ff41; padding: 10px; }
        .entry { margin-bottom: 8px; font-size: 13px; border-bottom: 1px solid #111; }
    </style>
</head>
<body>
    <div class="box">
        <h1>CYBER REQUESTER MONITOR</h1>
        <div id="status">BACKGROUND ENGINE: ACTIVE ✅</div>
        <div class="log-container" id="logs">
            <div class="entry">Waiting for background data... Logs will appear here as GitHub Actions run.</div>
        </div>
    </div>

    <script>
        // Meka close thibbath requests GitHub Actions haraha yanawa.
        // Oya logs save karanna external DB ekak use karanawanam eka mekata link karanna puluwan.
        console.log("Background requester started via GitHub Action trigger.");
    </script>
</body>
</html>
