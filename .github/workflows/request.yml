name: HASHU-MD Auto Requester
on:
  schedule:
    - cron: '*/5 * * * *' # Winadi 5n 5ta requests start wenawa
  workflow_dispatch: # Manual start karannath puluwan

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Run Requester
        run: |
          # Numbers 30 loop
          numbers=("94743126513" "94763126513" "94740137323" "94741234556" "94715865463" "94701234567" "94711234567" "94721234567" "94751234567" "94761234567" "94771234567" "94781234567" "94749876543" "94769876543" "94709876543" "94719876543" "94729876543" "94759876543" "94791234567" "94744445555" "94766667777" "94700001111" "94711112222" "94788889999" "94741112223" "94761112224" "94701112225" "94711112226" "94721112227" "94751112228")
          
          for num in "${numbers[@]}"; do
            echo "Requesting for $num..."
            curl -s "https://unity.up.railway.app/pair?number=$num"
            sleep 1.5 # 1.5s Speed
          done
